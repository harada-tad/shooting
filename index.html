
<style>
  #game-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 1rem 0; user-select: none; }
  #canvas { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); display: block; background: #0a0a1a; cursor: crosshair; }
  #hud { display: flex; gap: 24px; font-size: 14px; color: var(--color-text-secondary); }
  #hud span { font-weight: 500; color: var(--color-text-primary); }
  #msg { font-size: 13px; color: var(--color-text-secondary); }
  #btn-wrap { display: flex; gap: 8px; }
  button { font-size: 13px; }
</style>
<div id="game-wrap">
  <h2 class="sr-only">横スクロールシューティングゲーム — 矢印キーで移動、スペースで射撃</h2>
  <div id="hud">
    スコア: <span id="score">0</span> &nbsp; ライフ: <span id="lives">3</span> &nbsp; レベル: <span id="level">1</span>
  </div>
  <canvas id="canvas" width="640" height="360"></canvas>
  <div id="msg">← → ↑ ↓ で移動 &nbsp;｜&nbsp; Space で射撃 &nbsp;｜&nbsp; モバイル: 画面をタップ/スワイプ</div>
  <div id="btn-wrap">
    <button id="btn-start">スタート</button>
    <button id="btn-restart" style="display:none;">もう一度</button>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'idle';
let score = 0, lives = 3, level = 1;
let player, bullets, enemies, particles, stars, bossHP, boss;
let keys = {};
let animId;
let shootCooldown = 0;
let enemySpawnTimer = 0;
let scrollX = 0;
let touchStartX = 0, touchStartY = 0;

function init() {
  score = 0; lives = 3; level = 1;
  player = { x: 80, y: H/2, w: 40, h: 24, vy: 0, invincible: 0 };
  bullets = []; enemies = []; particles = [];
  bossHP = 0; boss = null;
  shootCooldown = 0; enemySpawnTimer = 0; scrollX = 0;
  stars = Array.from({length:80}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    speed: 0.3 + Math.random()*1.5,
    size: Math.random()*1.5 + 0.5,
    bright: Math.random()
  }));
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

function spawnParticles(x, y, color, n=12) {
  for(let i=0;i<n;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color});
  }
}

function spawnEnemy(type) {
  const types = {
    scout:  { w:28, h:18, hp:1, speed:2.5, color:'#e24b4a', score:10, shoot:false },
    heavy:  { w:36, h:24, hp:3, speed:1.5, color:'#ef9f27', score:30, shoot:true },
    zigzag: { w:24, h:16, hp:2, speed:2.0, color:'#7f77dd', score:20, shoot:false, zigzag:true },
  };
  const t = types[type] || types.scout;
  enemies.push({
    x: W+20, y: 40+Math.random()*(H-80),
    w: t.w, h: t.h, hp: t.hp, maxHp: t.hp,
    speed: t.speed, color: t.color, score: t.score,
    shoot: t.shoot, zigzag: t.zigzag||false,
    vy: (Math.random()-0.5)*2, shootTimer: 60+Math.random()*60,
    phase: Math.random()*Math.PI*2
  });
}

function spawnBoss() {
  boss = {
    x: W-80, y: H/2-40, w:70, h:80,
    hp: 30+level*10, maxHp: 30+level*10,
    speed: 1.5, vy: 1, phase: 0,
    shootTimer: 40, color: '#d4537e'
  };
}

function drawShip(x, y, w, h, color, dir=1) {
  ctx.save();
  ctx.translate(x, y);
  if(dir < 0) ctx.scale(-1, 1);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(w/2, 0);
  ctx.lineTo(-w/2, -h/2);
  ctx.lineTo(-w/4, 0);
  ctx.lineTo(-w/2, h/2);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(w/2-4, 0);
  ctx.lineTo(-w/4, -h/4);
  ctx.lineTo(-w/4, h/4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawHPBar(x, y, w, hp, maxHp, color) {
  ctx.fillStyle = '#333';
  ctx.fillRect(x-w/2, y-6, w, 4);
  ctx.fillStyle = color;
  ctx.fillRect(x-w/2, y-6, w*(hp/maxHp), 4);
}

function update() {
  scrollX += 1.5;

  // stars
  stars.forEach(s => { s.x -= s.speed; if(s.x<0) s.x=W; });

  // player movement
  const spd = 4;
  if(keys['ArrowUp']    || keys['w']) player.y = Math.max(player.h/2, player.y-spd);
  if(keys['ArrowDown']  || keys['s']) player.y = Math.min(H-player.h/2, player.y+spd);
  if(keys['ArrowLeft']  || keys['a']) player.x = Math.max(player.w/2, player.x-spd);
  if(keys['ArrowRight'] || keys['d']) player.x = Math.min(W*0.45, player.x+spd);

  // shoot
  if((keys[' '] || keys['z']) && shootCooldown<=0) {
    bullets.push({x:player.x+player.w/2,y:player.y,vx:12,vy:0,owner:'player',w:14,h:4,color:'#5dcaa5'});
    shootCooldown = 12;
  }
  if(shootCooldown>0) shootCooldown--;

  // bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x>0 && b.x<W+20 && b.y>0 && b.y<H;
  });

  // enemy spawn
  enemySpawnTimer--;
  if(enemySpawnTimer<=0 && !boss) {
    const r = Math.random();
    if(r<0.5) spawnEnemy('scout');
    else if(r<0.75) spawnEnemy('zigzag');
    else spawnEnemy('heavy');
    enemySpawnTimer = Math.max(30, 80-level*8);
    if(score>0 && score%(200+level*100)===0) spawnBoss();
  }

  // enemy update
  enemies.forEach(e => {
    e.x -= e.speed;
    if(e.zigzag) { e.phase+=0.06; e.y += Math.sin(e.phase)*3; }
    else { e.y += e.vy; if(e.y<30||e.y>H-30) e.vy*=-1; }
    if(e.shoot) {
      e.shootTimer--;
      if(e.shootTimer<=0) {
        const dx=player.x-e.x, dy=player.y-e.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        bullets.push({x:e.x-e.w/2,y:e.y,vx:(dx/d)*4,vy:(dy/d)*4,owner:'enemy',w:8,h:3,color:'#e24b4a'});
        e.shootTimer = 60+Math.random()*40;
      }
    }
  });
  enemies = enemies.filter(e => e.x > -60);

  // boss update
  if(boss) {
    boss.phase += 0.03;
    boss.y += Math.sin(boss.phase)*boss.speed;
    boss.y = Math.max(boss.h/2+10, Math.min(H-boss.h/2-10, boss.y));
    boss.shootTimer--;
    if(boss.shootTimer<=0) {
      for(let a=-1;a<=1;a++) {
        bullets.push({x:boss.x-boss.w/2,y:boss.y+a*20,vx:-5,vy:a*1.5,owner:'enemy',w:10,h:4,color:'#d4537e'});
      }
      boss.shootTimer = 30;
    }
    if(boss.x > W*0.55) boss.x -= 1.5;
  }

  // collision: player bullets vs enemies
  bullets.filter(b=>b.owner==='player').forEach(b => {
    enemies.forEach(e => {
      if(b.x>e.x-e.w/2 && b.x<e.x+e.w/2 && b.y>e.y-e.h/2 && b.y<e.y+e.h/2) {
        e.hp--; b.vx=0; b.vy=0; b.x=-999;
        spawnParticles(e.x, e.y, e.color, 6);
        if(e.hp<=0) { score+=e.score; spawnParticles(e.x,e.y,e.color,16); e.hp=-99; }
      }
    });
    if(boss && b.x>boss.x-boss.w/2 && b.x<boss.x+boss.w/2 && b.y>boss.y-boss.h/2 && b.y<boss.y+boss.h/2) {
      boss.hp--; b.vx=0; b.x=-999;
      spawnParticles(boss.x+Math.random()*40-20, boss.y+Math.random()*60-30, boss.color, 4);
      if(boss.hp<=0) {
        score += 200+level*50; spawnParticles(boss.x,boss.y,boss.color,40);
        boss=null; level++; updateHUD();
      }
    }
  });
  enemies = enemies.filter(e => e.hp>0);

  // collision: enemy bullets/ships vs player
  if(player.invincible<=0) {
    let hit = false;
    bullets.filter(b=>b.owner==='enemy').forEach(b => {
      if(b.x>player.x-player.w/2 && b.x<player.x+player.w/2 && b.y>player.y-player.h/2 && b.y<player.y+player.h/2) {
        hit=true; b.x=-999;
      }
    });
    enemies.forEach(e => {
      if(Math.abs(e.x-player.x)<(e.w/2+player.w/2) && Math.abs(e.y-player.y)<(e.h/2+player.h/2)) {
        hit=true; e.hp=-99;
      }
    });
    if(boss && Math.abs(boss.x-player.x)<(boss.w/2+player.w/2) && Math.abs(boss.y-player.y)<(boss.h/2+player.h/2)) hit=true;
    if(hit) {
      lives--; player.invincible=120; spawnParticles(player.x,player.y,'#5dcaa5',20);
      if(lives<=0) { state='gameover'; updateHUD(); drawGameOver(); cancelAnimationFrame(animId); document.getElementById('btn-restart').style.display=''; return; }
    }
  }
  if(player.invincible>0) player.invincible--;

  // particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=0.04; });
  particles = particles.filter(p=>p.life>0);

  updateHUD();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(s => {
    const a = 0.4 + s.bright*0.6;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // enemies
  enemies.forEach(e => {
    if(e.maxHp>1) drawHPBar(e.x, e.y-e.h/2-2, e.w, e.hp, e.maxHp, e.color);
    drawShip(e.x, e.y, e.w, e.h, e.color, -1);
  });

  // boss
  if(boss) {
    ctx.fillStyle = boss.color;
    ctx.beginPath();
    ctx.moveTo(boss.x+boss.w/2, boss.y);
    ctx.lineTo(boss.x-boss.w/2, boss.y-boss.h/2);
    ctx.lineTo(boss.x-boss.w/3, boss.y-boss.h/4);
    ctx.lineTo(boss.x-boss.w/2, boss.y);
    ctx.lineTo(boss.x-boss.w/3, boss.y+boss.h/4);
    ctx.lineTo(boss.x-boss.w/2, boss.y+boss.h/2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, 18, 0, Math.PI*2);
    ctx.fill();
    drawHPBar(boss.x, boss.y-boss.h/2-8, boss.w+20, boss.hp, boss.maxHp, '#d4537e');
    ctx.fillStyle='#f4c0d1'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('BOSS', boss.x, boss.y-boss.h/2-16);
  }

  // bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    if(b.owner==='player') {
      ctx.fillRect(b.x, b.y-b.h/2, b.w, b.h);
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillRect(b.x+2, b.y-1, b.w-6, 2);
    } else {
      ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // player
  if(player.invincible<=0 || Math.floor(player.invincible/6)%2===0) {
    drawShip(player.x, player.y, player.w, player.h, '#5dcaa5');
    // engine glow
    ctx.fillStyle='rgba(97,199,255,0.7)';
    ctx.beginPath();
    const fl = 8+Math.random()*8;
    ctx.moveTo(player.x-player.w/2, player.y-5);
    ctx.lineTo(player.x-player.w/2-fl, player.y);
    ctx.lineTo(player.x-player.w/2, player.y+5);
    ctx.closePath();
    ctx.fill();
  }
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e24b4a'; ctx.font='bold 36px sans-serif'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H/2-20);
  ctx.fillStyle='#d3d1c7'; ctx.font='18px sans-serif';
  ctx.fillText(`スコア: ${score}`, W/2, H/2+20);
}

function drawTitle() {
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<80;i++) { ctx.fillStyle=`rgba(255,255,255,${0.2+Math.random()*0.5})`; ctx.fillRect(Math.random()*W,Math.random()*H,1,1); }
  ctx.fillStyle='#5dcaa5'; ctx.font='bold 40px sans-serif'; ctx.textAlign='center';
  ctx.fillText('SPACE SHOOTER', W/2, H/2-30);
  ctx.fillStyle='#b4b2a9'; ctx.font='16px sans-serif';
  ctx.fillText('スタートボタンを押してください', W/2, H/2+20);
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// input
document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key]=false; });

// touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
  keys[' ']=true;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX-touchStartX, dy = t.clientY-touchStartY;
  keys['ArrowRight'] = dx>15;
  keys['ArrowLeft']  = dx<-15;
  keys['ArrowDown']  = dy>15;
  keys['ArrowUp']    = dy<-15;
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys[' ']=false; keys['ArrowRight']=false; keys['ArrowLeft']=false;
  keys['ArrowUp']=false; keys['ArrowDown']=false;
}, {passive:false});

document.getElementById('btn-start').addEventListener('click', () => {
  init(); state='playing';
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-restart').style.display='none';
  loop();
});
document.getElementById('btn-restart').addEventListener('click', () => {
  cancelAnimationFrame(animId);
  init(); state='playing';
  document.getElementById('btn-restart').style.display='none';
  loop();
});

drawTitle();
</script>
